<style>
/* Summary */
.crono-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem;}
.crono-sum-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:border-color .2s;}
.crono-sum-card:hover{border-color:rgba(198,154,58,.3);}
.crono-sum-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:4px;}
.crono-sum-val{font-family:var(--font-d);font-size:22px;font-weight:700;}
.crono-sum-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* Week nav */
.week-ctrl{display:flex;align-items:center;gap:8px;}
.wnav-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:17px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;transition:all .18s;font-family:var(--font);}
.wnav-btn:hover{border-color:var(--blue);color:var(--blue);}
.wnav-today{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:600;background:rgba(198,154,58,.1);border:1px solid rgba(198,154,58,.25);color:var(--blue);cursor:pointer;font-family:var(--font);transition:all .18s;white-space:nowrap;}
.wnav-today:hover{background:rgba(198,154,58,.2);}
.week-label{font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap;}

/* Board */
.board{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;align-items:start;}
.day-col{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:14px;padding:10px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s;}
.day-col.is-today{border-color:rgba(198,154,58,.35);background:rgba(198,154,58,.04);}
.day-header{text-align:center;padding-bottom:8px;border-bottom:1px solid var(--border);}
.day-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.day-col.is-today .day-name{color:var(--blue);}
.day-date{font-size:12px;font-weight:600;margin-top:2px;color:var(--text);}
.day-total{font-size:10px;color:var(--muted);margin-top:3px;font-variant-numeric:tabular-nums;}

/* Blocks */
.blocks-list{display:flex;flex-direction:column;gap:6px;min-height:4px;}
.block-item{border-radius:10px;padding:8px 9px;cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s;animation:blockIn .25s cubic-bezier(.22,1,.36,1) both;}
@keyframes blockIn{from{opacity:0;transform:scale(.9) translateY(-4px);}to{opacity:1;transform:scale(1) translateY(0);}}
.block-item:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.3);}
.block-color-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.block-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:18px;margin-bottom:3px;}
.block-hours{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.block-hours-val{font-weight:600;color:var(--text);}
.block-actual{font-size:10px;color:var(--green);font-weight:500;}
.block-del{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:4px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s,background .15s;}
.block-item:hover .block-del{opacity:1;}
.block-del:hover{background:rgba(255,80,80,.2);color:#ff5050;}

/* Add button */
.add-block-btn{width:100%;border:1px dashed rgba(255,255,255,.12);border-radius:8px;background:none;color:var(--muted);font-size:12px;padding:7px;cursor:pointer;font-family:var(--font);transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px;}
.add-block-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(198,154,58,.06);}

/* Inline form */
.block-form{background:rgba(255,255,255,.04);border:1px solid rgba(198,154,58,.3);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:8px;animation:blockIn .2s cubic-bezier(.22,1,.36,1) both;}
.subj-picker{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;}
.subj-chip{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all .15s;font-size:12px;font-weight:500;}
.subj-chip:hover{background:rgba(255,255,255,.06);}
.subj-chip.sel{border-color:var(--blue);background:rgba(198,154,58,.12);}
.subj-chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.subj-chip-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.subj-chip-check{font-size:11px;color:var(--blue);font-weight:700;opacity:0;transition:opacity .15s;}
.subj-chip.sel .subj-chip-check{opacity:1;}
.subj-empty{font-size:12px;color:var(--muted);padding:6px 0;text-align:center;}
.subj-empty a{color:var(--blue);text-decoration:none;}
.bf-hrs-row{display:flex;align-items:center;gap:6px;padding-top:4px;border-top:1px solid var(--border);}
.bf-hrs-label{font-size:11px;color:var(--muted);white-space:nowrap;}
.block-form-hrs{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:7px;padding:5px 8px;color:var(--text);font-family:var(--font);font-size:12px;width:64px;outline:none;transition:border-color .15s;-moz-appearance:textfield;flex-shrink:0;}
.block-form-hrs::-webkit-outer-spin-button,.block-form-hrs::-webkit-inner-spin-button{-webkit-appearance:none;}
.block-form-hrs:focus{border-color:var(--blue);}
.block-form-btns{display:flex;gap:6px;}
.bf-ok{flex:1;padding:5px 0;border-radius:7px;background:var(--blue);border:none;color:#fff;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.bf-ok:hover{opacity:.85;}
.bf-cancel{padding:5px 10px;border-radius:7px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;}
.bf-cancel:hover{border-color:var(--muted);color:var(--text);}

/* Responsive */
@media(max-width:1100px){.board{grid-template-columns:repeat(4,1fr);}}
@media(max-width:700px){.board{grid-template-columns:repeat(3,1fr);}.crono-summary{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){
  /* Scroll horizontal — mostra toda a semana */
  .board{
    display:flex;
    flex-direction:row;
    overflow-x:auto;
    gap:8px;
    padding-bottom:6px;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .board::-webkit-scrollbar{display:none;}
  .day-col{
    min-width:200px;
    flex-shrink:0;
    scroll-snap-align:start;
    display:flex!important; /* cancela os nth-child:display:none anteriores */
  }
  .crono-summary{grid-template-columns:1fr 1fr;}
  .week-label{display:none;}
  .wnav-today{font-size:11px;padding:4px 10px;}
}
@media(max-width:380px){.day-col{min-width:160px;}.crono-summary{grid-template-columns:1fr;}.crono-sum-val{font-size:18px;}}

[data-theme="light"] .day-col{background:rgba(0,0,0,.025);}
[data-theme="light"] .block-form{background:rgba(0,0,0,.03);}
[data-theme="light"] .block-form-name,[data-theme="light"] .block-form-hrs{background:rgba(0,0,0,.04);}
[data-theme="light"] .add-block-btn{border-color:rgba(0,0,0,.15);}
[data-theme="light"] .crono-sum-card{background:rgba(0,0,0,.03);}
[data-theme="light"] .ac-drop{background:#fff;border-color:rgba(0,0,0,.12);}
</style>

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='login.html';return;}
  cu=user;
  const access=await checkAccess(user);
  if(!access.ok){showPaywall();return;}
  if(access.trial)showTrialBanner(access.daysLeft);
  const pSnap=await getDoc(doc(db,`users/${cu.uid}/data`,'profile'));
  const pData=pSnap.exists()?pSnap.data():{};
  const name=pData.name||user.displayName||user.email.split('@')[0];
  window._profilePhoto=pData.photo||null;
  setAvatar(name,window._profilePhoto);
  const sSnap=await getDoc(doc(db,`users/${cu.uid}/data`,'subjects'));
  subjects=sSnap.exists()?sSnap.data().list||[]:[];
  await loadWeek();
});

function setAvatar(name,photo){
  const initials=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  const av=document.getElementById('avatar-el');
  if(photo)av.innerHTML=`<img src="${photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  else av.textContent=initials;
  document.getElementById('user-name-el').textContent=name;
}

async function loadWeek(){
  const wdays=getWeekDays(weekOffset);
  const fmt=d=>d.toLocaleDateString('pt-BR',{day:'numeric',month:'short'});
  document.getElementById('week-label').textContent=`${fmt(wdays[0])} – ${fmt(wdays[6])}`;

  try{
    // Plano fixo — sempre carrega o template (mesmo para todas as semanas)
    const planSnap=await getDoc(doc(db,`users/${cu.uid}/cronograma`,'template'));
    const stored=planSnap.exists()?planSnap.data():{};
    for(let i=0;i<7;i++){
      daysData[i]=(stored.days&&stored.days[String(i)])||[];
    }

    // Sessões reais da semana navegada (para mostrar progresso)
    const start=new Date(wdays[0]);
    const end=new Date(wdays[6]);end.setHours(23,59,59,999);
    const q=query(collection(db,`users/${cu.uid}/sessions`),where('startedAt','>=',Timestamp.fromDate(start)),where('startedAt','<=',Timestamp.fromDate(end)));
    const snap=await getDocs(q);
    actualData={};
    snap.docs.forEach(d=>{
      const s=d.data();
      if(!s.subjectId||!s.duration)return;
      const sDate=s.startedAt.toDate?s.startedAt.toDate():new Date(s.startedAt);
      const dow=sDate.getDay();
      const dayIdx=dow===0?6:dow-1;
      const k=s.subjectId+'_'+dayIdx;
      actualData[k]=(actualData[k]||0)+s.duration;
    });

    renderBoard();
  }catch(e){
    console.error('loadWeek',e);
    const board=document.getElementById('board');
    if(board)board.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:2.5rem 1rem;color:var(--muted);">Erro ao carregar cronograma: ${esc(e.code||e.message||'desconhecido')}<br><button class="wnav-today" style="margin-top:12px;" onclick="reloadWeek()">Recarregar</button></div>`;
  }
}

let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    // Sempre salva no template fixo
    const days={};
    for(let i=0;i<7;i++) days[String(i)]=daysData[i];
    try{await setDoc(doc(db,`users/${cu.uid}/cronograma`,'template'),{days});}catch(e){console.error('save cronograma',e);bzAlert('Erro ao salvar','Não foi possível salvar o cronograma: '+(e.code||e.message||'desconhecido'),'danger');}
  },700);
}

function getActual(subjectId,dayIdx){
  return actualData[subjectId+'_'+dayIdx]||0;
}

function renderBoard(){
  const wdays=getWeekDays(weekOffset);
  const board=document.getElementById('board');
  board.innerHTML='';
  let totalMins=0,totalActSecs=0;

  for(let i=0;i<7;i++){
    const d=wdays[i];
    const tod=isToday(d);
    const blocks=daysData[i]||[];
    const dayMins=blocks.reduce((a,b)=>a+(b.mins||0),0);
    const dayActSecs=blocks.reduce((a,b)=>a+getActual(b.subjectId,i),0);
    totalMins+=dayMins;totalActSecs+=dayActSecs;

    const col=document.createElement('div');
    col.className='day-col'+(tod?' is-today':'');
    col.dataset.day=i;

    const blocksHtml=blocks.map((bl,bi)=>{
      const sub=subjects.find(x=>x.id===bl.subjectId)||{name:bl.name||'?',color:'#C69A3A'};
      const actSecs=getActual(bl.subjectId,i);
      const bg=esc(sub.color)+'1a';
      return `<div class="block-item" style="background:${bg}" onclick="openEditBlock(${i},${bi},event)">
        <div class="block-color-bar" style="background:${esc(sub.color)}"></div>
        <div class="block-name" title="${esc(sub.name)}">${esc(sub.name)}</div>
        <div class="block-hours">
          <span class="block-hours-val">${fmtHm(bl.mins||0)}</span>
          ${actSecs?`<span class="block-actual">· ${fmtH(actSecs)} feito</span>`:''}
        </div>
        <button class="block-del" onclick="removeBlock(${i},${bi},event)" title="Remover">×</button>
      </div>`;
    }).join('');

    col.innerHTML=`
      <div class="day-header">
        <div class="day-name">${DIAS[i]}</div>
        <div class="day-date">${d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</div>
        ${dayMins?`<div class="day-total">${fmtHm(dayMins)}${dayActSecs?' · '+fmtH(dayActSecs)+' feito':''}</div>`:''}
      </div>
      <div class="blocks-list" id="bl-${i}">${blocksHtml}</div>
      <button class="add-block-btn" onclick="showAddForm(${i})">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
        Adicionar
      </button>`;
    board.appendChild(col);
  }

  // Summary
  document.getElementById('sum-planned').textContent=totalMins?fmtHm(totalMins):'—';
  document.getElementById('sum-actual').textContent=totalActSecs?fmtH(totalActSecs):'—';
  if(totalMins&&totalActSecs){
    const pct=Math.min(Math.round((totalActSecs/60)/totalMins*100),999);
    const el=document.getElementById('sum-pct');
    el.textContent=pct+'%';
    el.style.color=pct>=100?'var(--green)':pct>=50?'var(--text)':'var(--muted)';
  } else {
    document.getElementById('sum-pct').textContent='—';
    document.getElementById('sum-pct').style.color='';
  }
}

function closeForm(){
  if(activeFormEl){activeFormEl.remove();activeFormEl=null;}
  document.querySelectorAll('.ac-drop').forEach(d=>d.style.display='none');
}

function openForm(dayIdx,blockIdx){
  closeForm();
  const isEdit=blockIdx!==null;
  const existing=isEdit?daysData[dayIdx][blockIdx]:null;
  formState[dayIdx]={subjectId:existing?existing.subjectId:null};

  const formEl=document.createElement('div');
  formEl.className='block-form';
  formEl.dataset.formDay=dayIdx;

  if(!subjects.length){
    formEl.innerHTML=`
      <div class="subj-empty">Nenhuma matéria cadastrada.<br><a href="dashboard.html">Cadastre no Dashboard</a></div>
      <div class="block-form-btns"><button class="bf-cancel" onclick="closeForm()">Fechar</button></div>`;
  } else {
    const chips=subjects.map(s=>{
      const sel=existing&&existing.subjectId===s.id?' sel':'';
      return`<div class="subj-chip${sel}" onclick="pickSubj(${dayIdx},'${esc(s.id)}',this)">
        <div class="subj-chip-dot" style="background:${esc(s.color)}"></div>
        <span class="subj-chip-name">${esc(s.name)}</span>
        <span class="subj-chip-check">✓</span>
      </div>`;
    }).join('');
    const hrsVal=existing&&existing.mins?(existing.mins/60):'';
    formEl.innerHTML=`
      <div class="subj-picker">${chips}</div>
      <div class="bf-hrs-row">
        <span class="bf-hrs-label">Horas planejadas:</span>
        <input class="block-form-hrs" id="bfh-${dayIdx}" type="number" min="0" max="24" step="0.5" placeholder="0" value="${hrsVal}">
      </div>
      <div class="block-form-btns">
        <button class="bf-cancel" onclick="closeForm()">Cancelar</button>
        <button class="bf-ok" onclick="confirmBlock(${dayIdx},${isEdit?blockIdx:'null'})">${isEdit?'Salvar':'Adicionar'}</button>
      </div>`;
  }

  const container=document.getElementById(`bl-${dayIdx}`);
  if(isEdit){
    const blockEls=[...container.querySelectorAll('.block-item')];
    const target=blockEls[blockIdx];
    if(target)target.after(formEl);
    else container.appendChild(formEl);
  } else {
    container.appendChild(formEl);
  }
  activeFormEl=formEl;

  const hrsInp=document.getElementById(`bfh-${dayIdx}`);
  if(hrsInp){
    hrsInp.focus();
    hrsInp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){e.preventDefault();confirmBlock(dayIdx,isEdit?blockIdx:null);}
      if(e.key==='Escape'){closeForm();}
    });
  }
}

window.pickSubj=function(dayIdx,sid,el){
  formState[dayIdx]=formState[dayIdx]||{};
  formState[dayIdx].subjectId=sid;
  el.closest('.subj-picker').querySelectorAll('.subj-chip').forEach(c=>c.classList.toggle('sel',c===el));
  const hrsInp=document.getElementById(`bfh-${dayIdx}`);
  if(hrsInp)hrsInp.focus();
};

window.showAddForm=function(dayIdx){openForm(dayIdx,null);};
window.openEditBlock=function(dayIdx,blockIdx,e){if(e.target.classList.contains('block-del'))return;openForm(dayIdx,blockIdx);};
window.removeBlock=function(dayIdx,blockIdx,e){e.stopPropagation();daysData[dayIdx].splice(blockIdx,1);save();renderBoard();};
window.closeForm=closeForm;

window.confirmBlock=function(dayIdx,blockIdx){
  const sid=(formState[dayIdx]||{}).subjectId;
  if(!sid)return;
  const sub=subjects.find(x=>x.id===sid);
  if(!sub)return;
  const hrsInp=document.getElementById(`bfh-${dayIdx}`);
  const hrs=parseFloat(hrsInp?hrsInp.value:0)||0;
  const mins=Math.round(hrs*60);
  if(mins<=0){if(hrsInp){hrsInp.style.borderColor='var(--red)';hrsInp.focus();}return;}
  const isEdit=blockIdx!==null&&blockIdx!==undefined;
  if(isEdit){
    daysData[dayIdx][blockIdx]={...daysData[dayIdx][blockIdx],subjectId:sid,mins};
  } else {
    daysData[dayIdx].push({id:uid4(),subjectId:sid,mins});
  }
  closeForm();
  save();
  renderBoard();
};

// Close form on outside click
document.addEventListener('click',e=>{
  if(!activeFormEl)return;
  if(activeFormEl.contains(e.target))return;
  if(e.target.classList.contains('add-block-btn'))return;
  if(e.target.classList.contains('block-item')||e.target.closest('.block-item'))return;
  closeForm();
});

window.navWeek=function(dir){weekOffset+=dir;closeForm();loadWeek();};
window.goToday=function(){weekOffset=0;closeForm();loadWeek();};
window.reloadWeek=function(){loadWeek();};

window.openProfileModal=()=>{
  const name=document.getElementById('user-name-el').textContent;
  document.getElementById('profile-name-inp').value=name;
  const big=document.getElementById('profile-avatar-big');
  const initials=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  big.innerHTML=window._profilePhoto?`<img src="${window._profilePhoto}" style="width:100%;height:100%;object-fit:cover;">`:`<span style="font-size:28px;font-weight:700;">${initials}</span>`;
  document.getElementById('modal-profile').classList.add('open');
};
window.closeProfileModal=()=>document.getElementById('modal-profile').classList.remove('open');
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_deferredPrompt=e;const b=document.getElementById('install-btn');if(b)b.style.display='flex';});
window.addEventListener('appinstalled',()=>{const b=document.getElementById('install-btn');if(b)b.style.display='none';_deferredPrompt=null;});
window.installPWA=async()=>{if(!_deferredPrompt)return;_deferredPrompt.prompt();const{outcome}=await _deferredPrompt.userChoice;if(outcome==='accepted')_deferredPrompt=null;};
window.handlePhoto=(input)=>{const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');const max=200;const r=Math.min(max/img.width,max/img.height,1);canvas.width=Math.round(img.width*r);canvas.height=Math.round(img.height*r);canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);window._profilePhoto=canvas.toDataURL('image/jpeg',.75);document.getElementById('profile-avatar-big').innerHTML=`<img src="${window._profilePhoto}" style="width:100%;height:100%;object-fit:cover;">`;setAvatar(document.getElementById('user-name-el').textContent,window._profilePhoto);};img.src=e.target.result;};reader.readAsDataURL(file);};
window.saveProfile=async()=>{const name=document.getElementById('profile-name-inp').value.trim();if(!name)return;try{await setDoc(doc(db,`users/${cu.uid}/data`,'profile'),{name,photo:window._profilePhoto||null});setAvatar(name,window._profilePhoto);closeProfileModal();}catch(e){console.error(e);bzAlert('Erro','Não foi possível salvar o perfil: '+(e.code||e.message||'desconhecido'),'danger');}};
window.doLogout=async()=>{closeProfileModal();const{signOut}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");await signOut(auth);window.location.href='https://focadus.com.br/';};
window.resetData=async()=>{
  closeProfileModal();
  if(!cu){alert('Aguarde o login carregar e tente novamente.');return;}
  if(!confirm('⚠️ Resetar TODOS os dados?\n\nIsso apagará permanentemente: sessões, matérias, metas, cronograma e provas. Esta ação não pode ser desfeita.'))return;
  const confirmText=prompt('Digite CONFIRMAR para prosseguir:','');
  if(confirmText!=='CONFIRMAR'){alert('Cancelado.');return;}
  try{
    const{collection,getDocs,deleteDoc,doc:fdoc,setDoc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const uid=cu.uid;
    for(const sub of ['sessions','cronograma','notes']){
      const snap=await getDocs(collection(db,`users/${uid}/${sub}`));
      await Promise.all(snap.docs.map(d=>deleteDoc(d.ref)));
    }
    await setDoc(fdoc(db,`users/${uid}/data`,'subjects'),{list:[]});
    await setDoc(fdoc(db,`users/${uid}/data`,'meta'),{horas:0});
    await setDoc(fdoc(db,`users/${uid}/data`,'provas'),{list:[]});
    await deleteDoc(fdoc(db,`users/${uid}/data`,'timerState')).catch(()=>{});
    localStorage.removeItem('bz-timer');
    alert('✅ Todos os dados foram resetados com sucesso!');
    setTimeout(()=>window.location.reload(),800);
  }catch(e){
    console.error('resetData error',e);
    alert('❌ Erro ao resetar: '+(e.code||e.message||'desconhecido'));
  }
};
window.deleteAccount=async()=>{
  closeProfileModal();
  bzConfirm('Excluir conta permanentemente','Apagará TODOS os dados permanentemente. Esta ação não pode ser desfeita.','danger',()=>{
    bzPrompt('Confirmação final','Digite EXCLUIR para confirmar.','EXCLUIR','EXCLUIR',async()=>{
      try{
        const{collection,getDocs,deleteDoc,doc:fdoc,writeBatch}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        const uid=cu.uid;
        const batch=writeBatch(db);
        const subCollections=['sessions','exams','cronograma','notes'];
        for(const subColl of subCollections){
          const snap=await getDocs(collection(db,`users/${uid}/${subColl}`));
          snap.docs.forEach(d=>batch.delete(d.ref));
        }
        const dataSnap=await getDocs(collection(db,`users/${uid}/data`));
        dataSnap.docs.forEach(d=>batch.delete(d.ref));
        batch.delete(fdoc(db,`users/${uid}`));
        await batch.commit();
        await cu.delete();
        window.location.href='https://focadus.com.br/';
      }catch(e){
        if(e.code==='auth/requires-recent-login'){
          bzAlert('Reautenticação necessária','Por segurança, faça login novamente antes de excluir sua conta.','warn');
          const{signOut}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
          await signOut(auth);window.location.href='https://focadus.com.br/';
        }else{bzAlert('Erro',e.message,'danger');}
      }
    });
  });
};
