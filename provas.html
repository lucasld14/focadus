<style>
.prova-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:14px;transition:all .25s;position:relative;overflow:hidden;}
.prova-card:hover{border-color:rgba(198,154,58,.3);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.25);}
.prova-card.urgente{border-color:rgba(226,75,74,.3);background:rgba(226,75,74,.03);}
.prova-card.urgente::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);}
.prova-card.normal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue);}
.prova-card.concluida{opacity:.6;}
.prova-card.concluida::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--green);}
.prova-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.prova-nome{font-size:18px;font-weight:600;letter-spacing:-.2px;}
.prova-data{font-size:13px;color:var(--muted);margin-top:3px;}
.prova-dias-big{text-align:center;flex-shrink:0;}
.prova-num{font-size:52px;font-weight:700;letter-spacing:-2px;line-height:1;}
.prova-dias-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-top:12px;}
.status-normal{background:rgba(198,154,58,.1);color:var(--blue);}
.status-urgente{background:rgba(226,75,74,.1);color:var(--red);}
.status-semana{background:rgba(239,159,39,.1);color:var(--amber);}
.status-concluida{background:rgba(29,158,117,.1);color:var(--green);}
.prova-bar{background:var(--surface2);border-radius:4px;height:5px;margin-top:14px;overflow:hidden;}
.prova-bar-fill{height:100%;border-radius:4px;transition:width .8s ease;}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:8px;transition:all .15s;flex-shrink:0;}
.del-btn:hover{color:var(--red);background:rgba(226,75,74,.1);}
.empty-provas{text-align:center;padding:4rem 1rem;color:var(--muted);}
.empty-provas .empty-icon{margin-bottom:1rem;display:flex;justify-content:center;}
.empty-provas .empty-text{font-size:15px;line-height:1.7;}

@media(max-width:700px){
  .prova-num{font-size:38px;}
  .prova-nome{font-size:16px;}
}
@media(max-width:480px){
  .prova-header{flex-direction:column;gap:6px;}
  .prova-dias-big{text-align:left;}
  .prova-num{font-size:32px;letter-spacing:-1px;}
  .prova-nome{font-size:15px;}
  .prova-card{padding:1.1rem;}
}
</style>
</head>

      <button onclick="resetData()" class="account-action-btn amber"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Resetar todos os dados</button>
      <button onclick="deleteAccount()" class="account-action-btn danger"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg> Excluir conta permanentemente</button>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{initializeAppCheck,ReCaptchaV3Provider}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const FC={apiKey:"AIzaSyCy5sqb9OTa9AL6X3RfbFsnMXx90hiqpPs",authDomain:"brainzept.firebaseapp.com",projectId:"brainzept",storageBucket:"brainzept.firebasestorage.app",messagingSenderId:"187802304063",appId:"1:187802304063:web:00f06e412f1bfa89e7828a"};
const app=initializeApp(FC);initializeAppCheck(app,{provider:new ReCaptchaV3Provider('6Ldx9zwtAAAAAHo-bQtNHqh9pxGZGetqUcEGHqHD'),isTokenAutoRefreshEnabled:true});const auth=getAuth(app),db=getFirestore(app);
let cu,provas=[];
let _midnightTimer=null;

const th=localStorage.getItem('bz-theme')||'dark';
document.documentElement.setAttribute('data-theme',th);

function showPaywall(){
  document.body.innerHTML=`<style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0E1117;color:#F0EDE4;font-family:'Manrope',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
    .pw{max-width:420px;width:100%;text-align:center;}
    .pw-icon{font-size:56px;margin-bottom:20px;}
    .pw h1{font-size:26px;font-weight:700;margin-bottom:10px;}
    .pw p{color:#9A8A70;line-height:1.6;margin-bottom:28px;}
    .pw-btn{display:inline-block;background:#C69A3A;color:#fff;font-weight:700;font-size:16px;padding:14px 36px;border-radius:12px;text-decoration:none;transition:opacity .2s;}
    .pw-btn:hover{opacity:.85;}
    .pw-logout{margin-top:16px;font-size:13px;color:#9A8A70;cursor:pointer;background:none;border:none;}
    .pw-logout:hover{color:#F0EDE4;}
  </style>
  <div class="pw">
    <div class="pw-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <h1>Acesso Premium</h1>
    <p>Seu período de avaliação gratuita expirou.<br>Adquira o acesso vitalício por apenas <strong style="color:#C69A3A">R$29</strong> e continue estudando sem limites.</p>
    <a class="pw-btn" href="https://pay.kiwify.com.br/cZGAGEi" target="_blank">Desbloquear Agora — R$29</a><br>
    <button class="pw-logout" onclick="import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js').then(m=>m.signOut(m.getAuth())).finally(()=>{window.location.href='https://focadus.com.br/';})">Sair da conta</button>
  </div>`;
}
async function checkAccess(user){
  const snap=await getDocs(query(collection(db,'pagantes'),where('email','==',user.email)));
  if(!snap.empty) return {ok:true,trial:false,daysLeft:0};
  const created=new Date(user.metadata.creationTime);
  const diffDays=(Date.now()-created.getTime())/(1000*60*60*24);
  const daysLeft=Math.max(0,7-Math.floor(diffDays));
  if(daysLeft>0) return {ok:true,trial:true,daysLeft};
  return {ok:false,trial:false,daysLeft:0};
}
function showTrialBanner(daysLeft){
  const bar=document.createElement('div');
  bar.id='trial-bar';
  bar.innerHTML=`<style>
#trial-bar{position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(90deg,#F59E0B,#F97316);color:#000;font-family:'Manrope',sans-serif;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;padding:5px 16px;height:32px;}
#trial-bar a{background:#000;color:#fff;padding:3px 12px;border-radius:6px;text-decoration:none;font-size:11px;white-space:nowrap;flex-shrink:0;}
.sidebar{top:32px!important;}
.main{padding-top:calc(var(--topbar-h,60px) + 32px)!important;}
</style><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Período gratuito — <strong>${daysLeft} dia${daysLeft===1?'':'s'}</strong> restante${daysLeft===1?'':'s'}. Após isso seu acesso será bloqueado.
<a href="https://pay.kiwify.com.br/cZGAGEi" target="_blank">Garantir acesso — R$29</a>`;
  document.body.prepend(bar);
}
function showPremiumBadge(){
  const nameEl=document.getElementById('user-name-el');
  if(nameEl&&!document.getElementById('premium-badge')){
    const badge=document.createElement('div');
    badge.id='premium-badge';
    badge.textContent='✦ Premium';
    badge.style.cssText='display:inline-block;background:linear-gradient(90deg,#C69A3A,#F5C462);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0;';
    nameEl.parentNode.appendChild(badge);
  }
}

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='login.html';return;}
  cu=user;
  const access=await checkAccess(user);
  if(!access.ok){showPaywall();return;}
  if(access.trial){showTrialBanner(access.daysLeft);}else{setTimeout(()=>showPremiumBadge(),500);}
  const pSnap=await getDoc(doc(db,`users/${cu.uid}/data`,'profile'));
  const pData=pSnap.exists()?pSnap.data():{};
  const name=pData.name||user.displayName||user.email.split('@')[0];
  window._profilePhoto=pData.photo||null;
  setAvatar(name,window._profilePhoto);
  const prvSnap=await getDoc(doc(db,`users/${cu.uid}/data`,'provas'));
  provas=prvSnap.exists()?prvSnap.data().list||[]:[]; 
  renderProvas();
});

function setAvatar(name,photo){const initials=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);const av=document.getElementById('avatar-el');if(photo)av.innerHTML=`<img src="${photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;else av.textContent=initials;document.getElementById('user-name-el').textContent=name;}

function getStatus(diff){
  if(diff<0)return{label:'Concluída ✓',cls:'concluida status-concluida',cardCls:'concluida'};
  if(diff===0)return{label:'É hoje!',cls:'urgente status-urgente',cardCls:'urgente'};
  if(diff<=7)return{label:`Semana da prova!`,cls:'semana status-semana',cardCls:'urgente'};
  if(diff<=30)return{label:`Faltam ${diff} dias`,cls:'normal status-urgente',cardCls:'normal'};
  return{label:`Faltam ${diff} dias`,cls:'normal status-normal',cardCls:'normal'};
}

function renderProvas(){
  const el=document.getElementById('provas-list');
  if(!provas.length){
    el.innerHTML=`<div class="empty-provas"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.4"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div><div class="empty-text">Nenhuma prova cadastrada ainda.<br>Adicione sua primeira prova!</div></div>`;
    return;
  }
  const hoje=new Date();hoje.setHours(0,0,0,0);
  // Ordenar por data
  const sorted=[...provas].sort((a,b)=>new Date(a.data)-new Date(b.data));
  el.innerHTML=sorted.map((p,i)=>{
    const dataProva=new Date(p.data+'T00:00:00');
    const diff=Math.ceil((dataProva-hoje)/(1000*60*60*24));
    const total=Math.ceil((dataProva-new Date(p.criadaEm||Date.now()))/(1000*60*60*24));
    const passados=total-diff;
    const pctBar=total>0?Math.min(Math.round(passados/total*100),100):100;
    const st=getStatus(diff);
    return`<div class="prova-card ${st.cardCls}">
      <div class="prova-header">
        <div style="flex:1;">
          <div class="prova-nome">${p.nome}</div>
          <div class="prova-data">${dataProva.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
          <span class="status-badge ${st.cls}">${st.label}</span>
        </div>
        <div style="display:flex;align-items:flex-start;gap:8px;">
          ${diff>=0?`<div class="prova-dias-big"><div class="prova-num" style="color:${diff<=7?'var(--red)':diff<=30?'var(--amber)':'var(--blue)'};">${diff}</div><div class="prova-dias-label">dias</div></div>`:''}
          <button class="del-btn" onclick="removeProva('${p.id||p.criadaEm}')">✕</button>
        </div>
      </div>
      ${total>0&&diff>=0?`<div class="prova-bar"><div class="prova-bar-fill" style="width:${pctBar}%;background:${diff<=7?'var(--red)':diff<=30?'var(--amber)':'var(--blue)'};"></div></div><div style="font-size:11px;color:var(--muted);margin-top:6px;">${pctBar}% do tempo passou</div>`:''}
    </div>`;
  }).join('');
  // Re-renderiza na virada da meia-noite para manter a contagem correta (PWA fica aberto)
  if(_midnightTimer)clearTimeout(_midnightTimer);
  const prox=new Date();prox.setHours(24,0,5,0);
  _midnightTimer=setTimeout(renderProvas,prox-Date.now());
}

window.openProvaModal=()=>{document.getElementById('prova-data').min=new Date().toISOString().slice(0,10);document.getElementById('modal-prova').classList.add('open');setTimeout(()=>document.getElementById('prova-nome').focus(),100);};
window.closeProvaModal=()=>{document.getElementById('modal-prova').classList.remove('open');document.getElementById('prova-nome').value='';document.getElementById('prova-data').value='';};
window.addProva=async()=>{
  const nome=document.getElementById('prova-nome').value.trim();
  const data=document.getElementById('prova-data').value;
  if(!nome||!data)return;
  const hoje=new Date();hoje.setHours(0,0,0,0);
  if(new Date(data+'T00:00:00')<hoje){bzAlert('Data inválida','A data da prova precisa ser hoje ou no futuro.','warn');return;}
  const nova={id:(crypto.randomUUID?crypto.randomUUID():String(Date.now())+Math.random().toString(36).slice(2)),nome,data,criadaEm:Date.now()};
  try{
    await setDoc(doc(db,`users/${cu.uid}/data`,'provas'),{list:[...provas,nova]});
    provas.push(nova);
    renderProvas();closeProvaModal();
  }catch(e){bzAlert('Erro ao salvar prova',(e.code||e.message||'desconhecido'),'danger');}
};
window.removeProva=async(id)=>{
  const backup=[...provas];
  provas=provas.filter(x=>String(x.id||x.criadaEm)!==String(id));
  try{
    await setDoc(doc(db,`users/${cu.uid}/data`,'provas'),{list:provas});
    renderProvas();
  }catch(e){provas=backup;renderProvas();bzAlert('Erro ao remover prova',(e.code||e.message||'desconhecido'),'danger');}
};

window.openProfileModal=()=>{const name=document.getElementById('user-name-el').textContent;document.getElementById('profile-name-inp').value=name;const big=document.getElementById('profile-avatar-big');const initials=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);big.innerHTML=window._profilePhoto?`<img src="${window._profilePhoto}" style="width:100%;height:100%;object-fit:cover;">`:`<span style="font-size:28px;font-weight:700;">${initials}</span>`;document.getElementById('modal-profile').classList.add('open');};
window.closeProfileModal=()=>document.getElementById('modal-profile').classList.remove('open');
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_deferredPrompt=e;const b=document.getElementById('install-btn');if(b)b.style.display='flex';});
window.addEventListener('appinstalled',()=>{const b=document.getElementById('install-btn');if(b)b.style.display='none';_deferredPrompt=null;});
window.installPWA=async()=>{if(!_deferredPrompt)return;_deferredPrompt.prompt();const{outcome}=await _deferredPrompt.userChoice;if(outcome==='accepted')_deferredPrompt=null;};
window.handlePhoto=(input)=>{const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');const max=200;const r=Math.min(max/img.width,max/img.height,1);canvas.width=Math.round(img.width*r);canvas.height=Math.round(img.height*r);canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);window._profilePhoto=canvas.toDataURL('image/jpeg',.75);document.getElementById('profile-avatar-big').innerHTML=`<img src="${window._profilePhoto}" style="width:100%;height:100%;object-fit:cover;">`;setAvatar(document.getElementById('user-name-el').textContent,window._profilePhoto);};img.src=e.target.result;};reader.readAsDataURL(file);};
window.saveProfile=async()=>{const name=document.getElementById('profile-name-inp').value.trim();if(!name)return;try{await setDoc(doc(db,`users/${cu.uid}/data`,'profile'),{name,photo:window._profilePhoto||null});setAvatar(name,window._profilePhoto);closeProfileModal();}catch(e){bzAlert('Erro ao salvar perfil',(e.code||e.message||'desconhecido'),'danger');}};

window.doLogout=async()=>{
  closeProfileModal();
  const{signOut}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
  await signOut(auth);
  window.location.href='https://focadus.com.br/';
};

window.resetData=async()=>{
  closeProfileModal();
  if(!cu){alert('Aguarde o login carregar e tente novamente.');return;}
  if(!confirm('⚠️ Resetar TODOS os dados?\n\nIsso apagará permanentemente: sessões, matérias, metas, cronograma e provas. Esta ação não pode ser desfeita.'))return;
  const confirmText=prompt('Digite CONFIRMAR para prosseguir:','');
  if(confirmText!=='CONFIRMAR'){alert('Cancelado.');return;}
  try{
    const{collection,getDocs,deleteDoc,doc:fdoc,setDoc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const uid=cu.uid;
    for(const sub of ['sessions','cronograma','notes']){
      const snap=await getDocs(collection(db,`users/${uid}/${sub}`));
      await Promise.all(snap.docs.map(d=>deleteDoc(d.ref)));
    }
    await setDoc(fdoc(db,`users/${uid}/data`,'subjects'),{list:[]});
    await setDoc(fdoc(db,`users/${uid}/data`,'meta'),{horas:0});
    await setDoc(fdoc(db,`users/${uid}/data`,'provas'),{list:[]});
    await deleteDoc(fdoc(db,`users/${uid}/data`,'timerState')).catch(()=>{});
    localStorage.removeItem('bz-timer');
    alert('✅ Todos os dados foram resetados com sucesso!');
    setTimeout(()=>window.location.reload(),800);
  }catch(e){
    console.error('resetData error',e);
    alert('❌ Erro ao resetar: '+(e.code||e.message||'desconhecido'));
  }
};

window.deleteAccount=async()=>{
  closeProfileModal();
  bzConfirm('Excluir conta permanentemente','Apagará TODOS os dados permanentemente. Esta ação não pode ser desfeita.','danger',()=>{
    bzPrompt('Confirmação final','Digite EXCLUIR para confirmar.','EXCLUIR','EXCLUIR',async()=>{
      try{
        const{collection,getDocs,deleteDoc,doc:fdoc,writeBatch}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        const uid=cu.uid;
        const batch=writeBatch(db);
        // 1. Deleta todas as subcoleções
        const subCollections=['sessions','exams','cronograma','notes'];
        for(const subColl of subCollections){
          const snap=await getDocs(collection(db,`users/${uid}/${subColl}`));
          snap.docs.forEach(d=>batch.delete(d.ref));
        }
        // 2. Deleta documentos em /users/{uid}/data (profile, fcmToken, etc)
        const dataSnap=await getDocs(collection(db,`users/${uid}/data`));
        dataSnap.docs.forEach(d=>batch.delete(d.ref));
        // 3. Deleta o documento raiz /users/{uid}
        batch.delete(fdoc(db,`users/${uid}`));
        // 4. Aplica todos os deletes
        await batch.commit();
        // 5. Deleta a conta do Firebase
        await cu.delete();
        window.location.href='https://focadus.com.br/';
      }catch(e){
        if(e.code==='auth/requires-recent-login'){
          bzAlert('Reautenticação necessária','Por segurança, faça login novamente antes de excluir sua conta.','warn');
          const{signOut}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
          await signOut(auth);window.location.href='https://focadus.com.br/';
        }else{bzAlert('Erro',e.message,'danger');}
      }
    });
  });
};
</script>
